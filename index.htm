<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan - Randi & Raisya</title>
    <!-- Google Fonts Corak dan Tulisan -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f9f5f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #7A5C43;
            overflow: hidden;
        }

        .invitation-card {
            width: 100%;
            max-width: 450px;
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            background-color: transparent;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.03);
        }

        .card-bg-video {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            transition: opacity 0.8s ease-in-out;
        }

        .card-bg-overlay {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            /* Latar belakang transparan agar video 100% jelas */
            background: transparent;
            z-index: 2;
            transition: opacity 0.8s ease-in-out;
        }

        .content-wrapper {
            position: relative;
            z-index: 3;
            width: 80%;
            transition: opacity 0.8s ease-in-out, transform 0.8s ease-in-out;
        }

        /* Efek menghilang halus saat pindah halaman */
        .fade-out-all {
            opacity: 0 !important;
            transform: scale(0.92) !important;
            pointer-events: none;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-element {
            opacity: 0;
            animation: fadeInUp 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* Delay acak untuk efek masuk teks */
        .delay-1 {
            animation-delay: 0.2s;
        }

        .delay-2 {
            animation-delay: 1.1s;
        }

        .delay-3 {
            animation-delay: 0.5s;
        }

        .delay-4 {
            animation-delay: 1.4s;
        }

        .header-title {
            font-size: 0.95rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 400;
            color: #8C6A50;
            margin-bottom: 25px;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.6);
        }

        .photo-frame-container {
            position: relative;
            width: 220px;
            margin: 0 auto 10px auto;
        }

        .photo-frame {
            width: 200px;
            height: 290px;
            border-radius: 50% / 45%;
            border: 1.5px solid #7A5C43;
            overflow: hidden;
            margin: 0 auto;
            background-color: rgba(234, 221, 208, 0.4);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .flower-ornament {
            width: 180px;
            margin-top: -45px;
            position: relative;
            z-index: 4;
            filter: drop-shadow(0px 4px 8px rgba(0, 0, 0, 0.15));
        }

        .couple-name {
            font-family: 'Great Vibes', cursive;
            font-size: 3rem;
            font-weight: 400;
            color: #926A4B;
            margin: 15px 0 5px 0;
            line-height: 1.2;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.6);
        }

        .wedding-date {
            font-size: 1.15rem;
            font-weight: 500;
            color: #8C6A50;
            letter-spacing: 1px;
            margin-bottom: 25px;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.6);
        }

        .invitation-to {
            font-size: 0.85rem;
            color: #A08066;
            margin-bottom: 8px;
            letter-spacing: 1.5px;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.6);
        }

        .guest-name {
            font-size: 1.45rem;
            font-weight: 500;
            color: #61442E;
            margin-bottom: 30px;
            min-height: 35px;
            display: inline-block;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.6);
        }

        .open-btn {
            background-color: #4A3B32;
            color: #FDFBF7;
            border: none;
            padding: 12px 35px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 25px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(74, 59, 50, 0.2);
        }

        .open-btn:hover {
            background-color: #614F44;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(74, 59, 50, 0.3);
        }

        .open-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }
    </style>
</head>

<body>

    <!-- Audio Element untuk Musik Latar Belakang -->
    <audio id="wedding-audio" loop>
        <source src="musik.mp3" type="audio/mpeg">
    </audio>

    <div class="invitation-card">
        <!-- Video Latar Belakang -->
        <video class="card-bg-video" id="bg-video" autoplay loop muted playsinline>
            <source src="bg.mp4" type="video/mp4">
        </video>
        
        <div class="card-bg-overlay" id="bg-overlay"></div>
        
        <!-- Pembungkus Konten Utama -->
        <div class="content-wrapper" id="ornament-container">
            <p class="header-title fade-element delay-1">The Wedding</p>
            
            <div class="photo-frame-container fade-element delay-3">
                <div class="photo-frame">
                    <img src="fotocover.jpg" alt="Foto Pengantin">
                </div>
                <img src="" class="flower-ornament" alt="Ornamen Bunga" onerror="this.style.display='none'">
            </div>
            
            <div class="fade-element delay-2">
                <h1 class="couple-name">Randi & Raisya</h1>
                <p class="wedding-date">Kamis, 4 Juni 2026</p>
            </div>
            
            <div class="fade-element delay-4">
                <p class="invitation-to">Kepada Yth</p>
                <div class="guest-name" id="nama-tamu">Tamu Undangan</div>
                <br>
                <button class="open-btn" onclick="bukaDanPindah()">
                    <svg viewBox="0 0 24 24">
                        <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" />
                    </svg>
                    Buka Undangan
                </button>
            </div>
        </div>
    </div>

    <script>
        // MASUKKAN LINK TUJUAN HALAMAN KEDUA ANDA DI SINI
        const LINK_HALAMAN_DUA = "isi.html";

        // Membaca nama tamu otomatis dari URL (?to=Nama%20Tamu)
        function checkGuest() {
            const urlParams = new URLSearchParams(window.location.search);
            const guest = urlParams.get('to');
            if (guest) {
                document.getElementById('nama-tamu').innerText = guest;
            }
        }

        // Fungsi memicu pemutaran audio otomatis secara paksa lewat interaksi pertama
        function memicuAutoPlay() {
            const audio = document.getElementById("wedding-audio");
            audio.play().then(() => {
                // Jika berhasil diputar, hapus semua event listener agar tidak terpicu berulang kali
                menghapusListener();
            }).catch(function(error) {
                console.log("Browser menolak autoplay langsung, menunggu interaksi sentuhan layar pertama.");
            });
        }

        // Menambahkan listener agar musik menyala saat menyentuh, mengeklik, atau menggulir halaman
        window.addEventListener('click', memicuAutoPlay);
        window.addEventListener('touchstart', memicuAutoPlay);
        window.addEventListener('scroll', memicuAutoPlay);

        function menghapusListener() {
            window.removeEventListener('click', memicuAutoPlay);
            window.removeEventListener('touchstart', memicuAutoPlay);
            window.removeEventListener('scroll', memicuAutoPlay);
        }

        // Jalankan pengecekan nama tamu saat berkas selesai dimuat
        window.onload = function() {
            checkGuest();
            memicuAutoPlay();
        };

        // Fungsi transisi keluar halaman saat tombol diklik
        function bukaDanPindah() {
            // Memastikan musik langsung menyala jika klik pertama dilakukan tepat pada tombol
            const audio = document.getElementById("wedding-audio");
            audio.play().catch(() => {});

            // Menambahkan kelas efek memudar keluar pada container teks
            const content = document.getElementById("ornament-container");
            content.classList.add("fade-out-all");

            // Menunggu durasi animasi transisi CSS selesai (800ms) sebelum memindahkan halaman
            setTimeout(function() {
                window.location.href = LINK_HALAMAN_DUA;
            }, 800);
        }
    </script>

</body>
</html>
